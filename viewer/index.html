#toolbar input[type="file"] { display: none; }

.floor-tab:hover { background: #30363d; }

.floor-view.focused { flex: 3; }
.floor-view.minimized { flex: 0; min-width: 60px; max-width: 60px; }
.floor-label { position: absolute; top: 4px; left: 8px; font-size: 13px; font-weight: bold; color: #8b949e; z-index: 10; pointer-events: none; text-shadow: 0 1px 3px #000; }
.floor-view canvas { position: absolute; top: 0; left: 0; }
#event-panel { width: 200px; background: #161b22; border-left: 1px solid #30363d; padding: 8px; font-size: 11px; overflow-y: auto; flex-shrink: 0; }

.event-item.active { opacity: 1; background: #21262d; }
.event-item img { width: 16px; height: 16px; }

async function loadMapFloors(mapId) {
    const info = mapsData[mapId];
    floorGeos = {};
    for(const floor of info.floors) {
        try {
            const resp = await fetch(`${MAPS_PATH}/${mapId}/${floor}.json`);
            if(!resp.ok) continue;
            const data = await resp.json();
            const zRange = FLOOR_Z[floor];
            floorGeos[floor] = generateMap(data, zRange);
        } catch(e) { console.warn(`No trace for ${mapId}/${floor}`); }
    }
    buildFloorViews(info.floors);
    document.getElementById('status').textContent = `Loaded ${info.name}`;

function generateMap(srcData, zRange) {
    const positions = srcData.playerPositions || {};
    const allPts = [];
    for(const arr of Object.values(positions))
        for(const p of arr)
            if((Math.abs(p.x)>1||Math.abs(p.y)>1)&&p.z>-50)
                if(!zRange||(p.z>=zRange[0]&&p.z<zRange[1]))
                    allPts.push(p);
    if(allPts.length<10)return null;
    const SCALE=14,PAD=40;
    const xs=allPts.map(p=>p.x),ys=allPts.map(p=>p.y);
    const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);

    function erode(s,r){const d=new Uint8Array(w*h);for(let y=r;y<h-r;y++)for(let x=r;x<w-r;x++){let a=true;for(let dy=-r;dy<=r&&a;dy++)for(let dx=-r;dx<=r;dx++)if(dx*dx+dy*dy<=r*r&&!s[(y+dy)*w+(x+dx)]){a=false;break;}d[y*w+x]=a?1:0;}return d;}
    let closed=dilate(binary,4);closed=erode(closed,3);
    const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;const tctx=canvas.getContext('2d');
    tctx.fillStyle='#0d1117';tctx.fillRect(0,0,w,h);
    const imgData=tctx.createImageData(w,h);
    for(let i=0;i<w*h;i++){if(closed[i]){imgData.data[i*4]=28;imgData.data[i*4+1]=33;imgData.data[i*4+2]=45;imgData.data[i*4+3]=255;}else{imgData.data[i*4]=13;imgData.data[i*4+1]=17;imgData.data[i*4+2]=23;imgData.data[i*4+3]=255;}}
    tctx.putImageData(imgData,0,0);
    tctx.strokeStyle='#b0b8c4';tctx.lineWidth=2;tctx.lineCap='round';
    for(let y=1;y<h-1;y++){let ss=-1;for(let x=0;x<w;x++){const e=closed[y*w+x]&&((y>0&&!closed[(y-1)*w+x])||(y<h-1&&!closed[(y+1)*w+x]));if(e&&ss<0)ss=x;else if(!e&&ss>=0){if(x-ss>3){tctx.beginPath();tctx.moveTo(ss,y);tctx.lineTo(x,y);tctx.stroke();}ss=-1;}}}
    for(let x=1;x<w-1;x++){let ss=-1;for(let y=0;y<h;y++){const e=closed[y*w+x]&&((x>0&&!closed[y*w+x-1])||(x<w-1&&!closed[y*w+x+1]));if(e&&ss<0)ss=y;else if(!e&&ss>=0){if(y-ss>3){tctx.beginPath();tctx.moveTo(x,ss);tctx.lineTo(x,y);tctx.stroke();}ss=-1;}}}
    return{canvas,w,h,transform:{ax:[SCALE,0,-minX*SCALE+PAD],ay:[0,-SCALE,maxY*SCALE+PAD]}};
}

function gameToPixelFloor(gx, gy, floorGeo) {
    if(!floorGeo)return null;
    const t=floorGeo.transform;
    return[t.ax[0]*gx+t.ax[1]*gy+t.ax[2],t.ay[0]*gx+t.ay[1]*gy+t.ay[2]];
}

// === BUILD FLOOR VIEWS ===
function buildFloorViews(floors) {
    const container = document.getElementById('floors-container');
    const timerNode = document.getElementById('ingame-timer');
    if(timerNode) timerNode.remove();
    container.innerHTML = '';
    if(timerNode) container.appendChild(timerNode);
    else container.insertAdjacentHTML('beforeend','<div id="ingame-timer"><div class="phase-label">PREP</div><div id="ingame-time">0:45</div></div>');
    const tabs = document.getElementById('floor-tabs');
    tabs.innerHTML = '';
    floorCanvases = {};
    hiddenFloors = new Set();
    focusedFloor = null;

    for(const floor of floors) {
        // Tab — click to toggle visibility, double-click to solo
        const tab = document.createElement('div'); tab.className='floor-tab active';
        tab.textContent = FLOOR_LABELS[floor]||floor.toUpperCase();
        tab.dataset.floor = floor;
        tab.addEventListener('click',(e)=>{
            e.stopPropagation();
            if(hiddenFloors.has(floor)){
                hiddenFloors.delete(floor);
                tab.classList.add('active');
            } else {
                // Don't hide if it's the last visible floor
                const visibleCount = floors.filter(f=>!hiddenFloors.has(f)).length;
                if(visibleCount > 1){
                    hiddenFloors.add(floor);
                    tab.classList.remove('active');
                }
            }
            focusedFloor = null;
            updateFloorFocus();
        });
        tab.addEventListener('dblclick',(e)=>{
            e.stopPropagation();
            // Solo this floor (hide all others) or unsolo (show all)
            const allOthersHidden = floors.every(f=>f===floor||hiddenFloors.has(f));
            if(allOthersHidden){
                // Unsolo — show all
                hiddenFloors.clear();
                focusedFloor = null;
            } else {
                // Solo — hide all others, expand this one
                hiddenFloors.clear();
                floors.forEach(f=>{if(f!==floor)hiddenFloors.add(f);});
                focusedFloor = floor;
            }
            updateFloorTabs();
            updateFloorFocus();
        });
        tabs.appendChild(tab);

        // Floor view
        const view = document.createElement('div'); view.className='floor-view'; view.dataset.floor=floor;
        const label = document.createElement('div'); label.className='floor-label';
        label.textContent = FLOOR_LABELS[floor]||floor.toUpperCase();
        const mapCvs = document.createElement('canvas');
        const olCvs = document.createElement('canvas');
        olCvs.style.position='absolute'; olCvs.style.top='0'; olCvs.style.left='0';
        view.append(label, mapCvs, olCvs);
        container.appendChild(view);

        const geo = floorGeos[floor];
        if(geo) {
            mapCvs.width=geo.w; mapCvs.height=geo.h;
            olCvs.width=geo.w; olCvs.height=geo.h;
            mapCvs.getContext('2d').drawImage(geo.canvas,0,0);
            const scaleToFit = () => {
                const rect = view.getBoundingClientRect();
                if(rect.width<1||rect.height<1)return;
                const scale = Math.min(rect.width/geo.w, rect.height/geo.h);
                const ox = (rect.width - geo.w*scale)/2, oy = (rect.height - geo.h*scale)/2;
                mapCvs.style.transform = olCvs.style.transform = `translate(${ox}px,${oy}px) scale(${scale})`;
                mapCvs.style.transformOrigin = olCvs.style.transformOrigin = '0 0';
            };
            floorCanvases[floor] = {map:mapCvs, overlay:olCvs, view, scaleToFit};
            requestAnimationFrame(scaleToFit);
            new ResizeObserver(scaleToFit).observe(view);
        }
    }
}

function updateFloorTabs(){
    document.querySelectorAll('#floor-tabs .floor-tab').forEach(t=>{
        const f=t.dataset.floor;
        if(f) t.classList.toggle('active',!hiddenFloors.has(f));
    });
}

function updateFloorFocus() {
    document.querySelectorAll('.floor-view').forEach(v => {
        const f = v.dataset.floor;
        v.classList.remove('focused','minimized');
        v.style.display = '';
        if(hiddenFloors.has(f)){
            v.style.display = 'none';
        } else if(focusedFloor && f===focusedFloor){
            v.classList.add('focused');
        }
    });
    setTimeout(()=>{ for(const fc of Object.values(floorCanvases)) if(fc.scaleToFit) fc.scaleToFit(); }, 350);
}

// === PROCESS REPLAY ===
function processData() {
    if(!posData) return;
    playerPaths = {};
    // Compute roundDuration from max position elapsed time
    let maxPosTime = 0;
    for(const[user,posArr]of Object.entries(posData.playerPositions||{})){
        for(const p of posArr){
            const t = p.t || p.timeInSeconds || 0;
            if(t > maxPosTime) maxPosTime = t;
        }
    }
    roundDuration = maxPosTime > 0 ? maxPosTime : (posData.roundDuration || posData._maxTime || 131);
    for(const[user,posArr]of Object.entries(posData.playerPositions||{})){
        let pts = posArr.filter(p=>(Math.abs(p.x)>1||Math.abs(p.y)>1)&&p.z>-50);
        const clean = pts.length ? [pts[0]] : [];
        for(let i=1;i<pts.length;i++){
            const dx=pts[i].x-clean[clean.length-1].x,dy=pts[i].y-clean[clean.length-1].y;
            if(Math.sqrt(dx*dx+dy*dy)<8) clean.push(pts[i]);
        }
        const tagged = clean.map(p=>({...p, t: p.t || p.timeInSeconds || 0, floor: getFloorForZ(p.z)}));
        playerPaths[user] = tagged;
    }
    activities = posData.activities || [];

    // Build gameClock-to-elapsed mapping from position data
    // gameClock values come from real .rec time packets
    gameClockMap = []; // sorted by elapsed, [{t, clock}]
    for(const[user,posArr]of Object.entries(posData.playerPositions||{})){
        for(const p of posArr){
            const gc = p.gameClock;
            if(gc !== undefined && gc !== null){
                gameClockMap.push({t: p.t || p.timeInSeconds || 0, clock: gc});
            }
        }
    }
    gameClockMap.sort((a,b) => a.t - b.t);
    // Deduplicate: keep one sample per ~0.5 elapsed second
    if(gameClockMap.length > 0){
        const deduped = [gameClockMap[0]];
        for(let i=1;i<gameClockMap.length;i++){
            if(gameClockMap[i].t - deduped[deduped.length-1].t >= 0.5) deduped.push(gameClockMap[i]);
        }
        gameClockMap = deduped;
    }

    // Detect prep end: find the gameClock jump (from low prep values back up to ~179)
    prepEndTime = 45; // default
    for(let i=1;i<gameClockMap.length;i++){
        if(gameClockMap[i].clock - gameClockMap[i-1].clock > 50){
            prepEndTime = gameClockMap[i].t;
            break;
        }
    }

    // Build action-phase-only clock samples (elapsed >= prepEndTime)
    actionClockMap = gameClockMap.filter(s => s.t >= prepEndTime);

    // Extract death times from position data: when the player stops moving
    playerDeathTimes = {};
    for(const evt of (posData.matchFeedback||[])){
        if(evt.type && (evt.type.name === 'Kill' || evt.type.name === 'Death')){
            const target = evt.target || evt.username;
            const path = playerPaths[target];
            if(path && path.length > 1){
                // Find the last position with meaningful movement
                let lastMovingIdx = 0;
                for(let i=1;i<path.length;i++){
                    const dx=path[i].x-path[i-1].x, dy=path[i].y-path[i-1].y;
                    if(Math.sqrt(dx*dx+dy*dy) > 0.05) lastMovingIdx = i;
                }
                playerDeathTimes[target] = path[lastMovingIdx].t;
            } else if(path && path.length === 1){
                playerDeathTimes[target] = path[0].t;
            }
        }
    }

    // Timeline uses seconds * 10 for smooth scrubbing
    totalFrames = Math.round(roundDuration * 10);
    document.getElementById('timeline').max = totalFrames;
    playTime = 0; playFrame = 0;

    // Show site info
    const siteDiv = document.getElementById('site-info');
    if (posData.site) {
        siteDiv.textContent = '📍 ' + posData.site;
        siteDiv.style.display = 'block';
    }
}

// === DRAW FRAME ===
function drawFrame() {
    try { _drawFrame(); } catch(e) { console.error('Draw error:', e); }
}
function _drawFrame() {
    // Clear all overlays
    for(const[floor, fc]of Object.entries(floorCanvases)){
        const ctx = fc.overlay.getContext('2d');
        ctx.clearRect(0, 0, fc.overlay.width, fc.overlay.height);
    }
    if(!posData) return;
    updatePlayerDeathStatus();

    const curTime = playTime; // elapsed seconds

    for(const[user,path]of Object.entries(playerPaths)){
        if(!playerVisible[user]) continue;
        const color = playerColors[user] || '#fff';
        if(path.length < 2) continue;

        // Check if player is dead at current time
        const deathTime = playerDeathTimes[user];
        const isDead = deathTime !== undefined && curTime >= deathTime;

        // Find position at current time using the t field
        let idx = -1;
        for(let i=0;i<path.length;i++){
            const pt = path[i].t || 0;
            if(pt < 0) continue;
            if(pt <= curTime) idx = i;
            else break;
        }
        if(idx < 0) continue;
        const curFloor = path[idx].floor;
        const player = (posData.players||[]).find(p=>p.username===user);
        const opName = player ? getPlayerOpName(player) : null;

        // Draw on each floor's overlay
        for(const[floor, fc]of Object.entries(floorCanvases)){
            const geo = floorGeos[floor]; if(!geo) continue;
            const ctx = fc.overlay.getContext('2d');

            // Trail for this floor (dimmer if dead)
            ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.globalAlpha=isDead?0.08:0.2;
            let started=false;
            for(let i=0;i<=idx;i++){
                if((path[i].t||0)<0 || path[i].floor!==floor) { started=false; continue; }
                const pt=gameToPixelFloor(path[i].x,path[i].y,geo);
                if(!pt)continue;
                if(!started){ctx.moveTo(pt[0],pt[1]);started=true;} else ctx.lineTo(pt[0],pt[1]);
            }
            ctx.stroke(); ctx.globalAlpha=1;

            // Recent trail + icon on current floor
            if(curFloor===floor){
                if(!isDead){
                    const rs=Math.max(0,idx-40);
                    ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=2.5; ctx.globalAlpha=0.6; started=false;
                    for(let i=rs;i<=idx;i++){
                        if((path[i].t||0)<0 || path[i].floor!==floor){started=false;continue;}
                        const pt=gameToPixelFloor(path[i].x,path[i].y,geo);
                        if(!pt)continue;
                        if(!started){ctx.moveTo(pt[0],pt[1]);started=true;} else ctx.lineTo(pt[0],pt[1]);
                    }
                    ctx.stroke(); ctx.globalAlpha=1;
                }

                // Player icon (grayed out if dead)
                const cur = gameToPixelFloor(path[idx].x,path[idx].y,geo);
                if(cur){
                    const opImg = opName ? getOpImage(opName) : null;
                    if(isDead){
                        // Dead: gray X marker
                        ctx.globalAlpha=0.3;
                        ctx.font='bold 16px sans-serif';ctx.fillStyle='#ff4444';ctx.strokeStyle='#000';ctx.lineWidth=2;
                        ctx.strokeText('\u2620',cur[0]-6,cur[1]+6);ctx.fillText('\u2620',cur[0]-6,cur[1]+6);
                        ctx.font='bold 8px sans-serif';ctx.fillStyle='#888';
                        ctx.strokeText(user,cur[0]+12,cur[1]-2);ctx.fillText(user,cur[0]+12,cur[1]-2);
                        ctx.globalAlpha=1;
                    } else if(opImg&&opImg.complete&&opImg.naturalWidth>0){
                        const sz=24;
                        ctx.beginPath();ctx.arc(cur[0],cur[1],sz/2+2,0,Math.PI*2);ctx.fillStyle=color;ctx.globalAlpha=0.3;ctx.fill();ctx.globalAlpha=1;
                        ctx.drawImage(opImg,cur[0]-sz/2,cur[1]-sz/2,sz,sz);
                        ctx.beginPath();ctx.arc(cur[0],cur[1],sz/2,0,Math.PI*2);ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke();
                        ctx.font='bold 9px sans-serif';ctx.fillStyle=color;ctx.strokeStyle='#000';ctx.lineWidth=2;
                        ctx.strokeText(user,cur[0]+14,cur[1]-4);ctx.fillText(user,cur[0]+14,cur[1]-4);
                    } else {
                        ctx.beginPath();ctx.arc(cur[0],cur[1],6,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();ctx.strokeStyle='#000';ctx.lineWidth=1.5;ctx.stroke();
                        ctx.font='bold 9px sans-serif';ctx.fillStyle=color;ctx.strokeStyle='#000';ctx.lineWidth=2;
                        ctx.strokeText(user,cur[0]+14,cur[1]-4);ctx.fillText(user,cur[0]+14,cur[1]-4);
                    }
                }
            }
        }
    }

    // Activities
    for(const act of activities){
        const maxTime = roundDuration;
        const af=1-(act.timeInSeconds/maxTime);
        const actElapsed = roundDuration - act.timeInSeconds;
        if(actElapsed > curTime) continue;
        if(Math.abs(act.x)<1&&Math.abs(act.y)<1)continue;
        const actFloor = getFloorForZ(act.z);
        const fc = floorCanvases[actFloor]; if(!fc) continue;
        const geo = floorGeos[actFloor]; if(!geo) continue;
        const pt=gameToPixelFloor(act.x,act.y,geo); if(!pt)continue;
        const ctx = fc.overlay.getContext('2d');
        let fill;switch(act.type){case'reinforce':fill='#00bfff';break;case'gadget':fill='#ffff00';break;case'kill':fill='#ff0000';break;default:fill='#888';}
        const age = (curTime - actElapsed) / roundDuration; const sc=Math.min(1,age*50);const sz=5*(0.5+0.5*sc);
        ctx.save();ctx.translate(pt[0],pt[1]);ctx.rotate(Math.PI/4);ctx.fillStyle=fill;ctx.globalAlpha=0.5+0.5*sc;ctx.fillRect(-sz,-sz,sz*2,sz*2);ctx.strokeStyle='#000';ctx.lineWidth=1;ctx.strokeRect(-sz,-sz,sz*2,sz*2);ctx.restore();ctx.globalAlpha=1;
        ctx.font='8px sans-serif';ctx.fillStyle='#fff';ctx.strokeStyle='#000';ctx.lineWidth=2;
        ctx.strokeText(`${act.type} (${act.time})`,pt[0]+sz+2,pt[1]-3);ctx.fillText(`${act.type} (${act.time})`,pt[0]+sz+2,pt[1]-3);
    }
    // Reinforcements
    for(const reinf of (posData.reinforcements||[])){
        if(!reinf.username || (Math.abs(reinf.x)<1 && Math.abs(reinf.y)<1)) continue;
        // Find elapsed time of this reinforcement from position data
        const path = playerPaths[reinf.username];
        let reinfElapsed = roundDuration - reinf.timeInSeconds;
        if(path){
            let bestDist = Infinity;
            for(const p of path){
                const dx=p.x-reinf.x, dy=p.y-reinf.y;
                const d=Math.sqrt(dx*dx+dy*dy);
                if(d<bestDist){bestDist=d; reinfElapsed=p.t;}
            }
        }
        if(reinfElapsed > curTime) continue;
        const reinfFloor = getFloorForZ(reinf.z);
        const fc = floorCanvases[reinfFloor]; if(!fc) continue;
        const geo = floorGeos[reinfFloor]; if(!geo) continue;
        const pt = gameToPixelFloor(reinf.x, reinf.y, geo); if(!pt) continue;
        const ctx = fc.overlay.getContext('2d');
        const color = playerColors[reinf.username] || '#00bfff';
        // Draw reinforcement panel icon (rectangle with border)
        const age = (curTime - reinfElapsed) / roundDuration;
        const sc = Math.min(1, age * 20);
        ctx.save();
        ctx.translate(pt[0], pt[1]);
        // Filled rectangle representing reinforcement panel
        ctx.fillStyle = '#00bfff';
        ctx.globalAlpha = 0.6 + 0.4 * sc;
        ctx.fillRect(-4, -6, 8, 12);
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.5;
        ctx.strokeRect(-4, -6, 8, 12);
        ctx.restore();
        ctx.globalAlpha = 1;
        ctx.font = '7px sans-serif';
        ctx.fillStyle = '#00bfff';
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 2;
        ctx.strokeText(reinf.username, pt[0]+8, pt[1]-2);
        ctx.fillText(reinf.username, pt[0]+8, pt[1]-2);
    }

    updateEventHighlights(curTime);
}

function updateEventHighlights(t){document.querySelectorAll('.event-item').forEach(el=>{const et=parseFloat(el.dataset.elapsed||0);el.classList.toggle('active',et<=t&&et>t-3);});}

// === PLAYBACK ===
function animate(ts){
    try {
        if(!playing)return;
        if(!lastAnimTime){ lastAnimTime=ts; requestAnimationFrame(animate); return; }
        const dt=(ts-lastAnimTime)/1000;
        lastAnimTime=ts;
        if(dt > 0.5) { requestAnimationFrame(animate); return; }
        playTime += dt * playSpeed;
        if(playTime >= roundDuration){ playTime=roundDuration; playing=false; document.getElementById('play-btn').textContent='\u25B6'; }
        playFrame = Math.round(playTime * 10);
        document.getElementById('timeline').value = playFrame;
        updateTimeDisplay(); drawFrame();
        if(playing) requestAnimationFrame(animate);
    } catch(e) {
        console.error('Animation error:', e);
        playing = false;
    }
}
function updateTimeDisplay(){
    const remaining = roundDuration - playTime;
    const m=Math.floor(remaining/60), s=Math.floor(remaining%60);
    document.getElementById('time-display').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    // In-game timer: prep phase (0:45->0:00) then action phase (countdown)
    const timerEl = document.getElementById('ingame-time');
    const labelEl = document.querySelector('#ingame-timer .phase-label');
    if(!timerEl || !labelEl) return;
    if(playTime < prepEndTime){
        // Prep phase: count down from 0:45 to 0:00
        const prepTotal = 45; // in-game prep is always 45s display
        const prepFrac = playTime / prepEndTime;
        const prepRemain = Math.ceil(prepTotal * (1 - prepFrac));
        const ps = Math.min(prepRemain, prepTotal);
        labelEl.textContent = 'PREP';
        labelEl.style.color = '#ffd43b';
        timerEl.textContent = `0:${ps.toString().padStart(2,'0')}`;
    } else {
        // Action phase: look up real game clock from action-phase position data
        let clock = Math.max(0, ACTION_TIMER_START - (playTime - prepEndTime)); // fallback
        // Binary search gameClockMap for current playTime (only action entries)
        let lo=0, hi=gameClockMap.length-1;
        while(lo<=hi){
            const mid=(lo+hi)>>1;
            if(gameClockMap[mid].t<=playTime) lo=mid+1; else hi=mid-1;
        }
        if(hi>=0 && hi<gameClockMap.length && gameClockMap[hi].t >= prepEndTime){
            clock = gameClockMap[hi].clock;
        }
        const am=Math.floor(clock/60), as_=Math.floor(clock%60);
        labelEl.textContent = 'ACTION';
        labelEl.style.color = '#8b949e';
        timerEl.textContent = `${am}:${as_.toString().padStart(2,'0')}`;
    }
}

document.getElementById('timeline').addEventListener('input',e=>{playFrame=parseInt(e.target.value);playTime=playFrame/10;updateTimeDisplay();drawFrame();});
const speeds=[0.25,0.5,1,2,4,8];let speedIdx=2;
function cycleSpeed(){speedIdx=(speedIdx+1)%speeds.length;playSpeed=speeds[speedIdx];document.getElementById('speed-btn').textContent=playSpeed+'x';document.getElementById('speed-btn2').textContent=playSpeed+'x';}

document.getElementById('speed-btn2').addEventListener('click',cycleSpeed);

// === LOAD REPLAY ===
document.getElementById('json-input').addEventListener('change',e=>{
    const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=()=>{
        posData=JSON.parse(reader.result);
        let maxT=45;for(const a of(posData.activities||[]))if(a.timeInSeconds>maxT)maxT=a.timeInSeconds;
        posData._maxTime=maxT;

        const users=Object.keys(positions);
        const players=posData.players||[];
        let ai=0,di=0;
        users.forEach(u=>{const p=players.find(pl=>pl.username===u);const team=p?posData.teams[p.teamIndex]:null;if(team&&team.role==='Attack'){playerColors[u]=COLORS_ATK[ai%COLORS_ATK.length];ai++;}else{playerColors[u]=COLORS_DEF[di%COLORS_DEF.length];di++;}playerVisible[u]=true;});
        processData(); buildPlayerList(); buildLoadoutBar(); buildEventList();

        // If no map loaded, auto-generate from replay data
        if(Object.keys(floorGeos).length===0){
            for(const[fName,zRange]of Object.entries(FLOOR_Z)){
                const geo=generateMap(posData,zRange);
                if(geo) floorGeos[fName]=geo;
            }
            const floors=Object.keys(floorGeos).sort();
            if(floors.length)buildFloorViews(floors);
        }

        document.getElementById('data-info').textContent=`${users.length} players, ${Object.values(positions).reduce((s,a)=>s+a.length,0)} pts`;

    };

});

function buildPlayerList(){

            const deathIcon=document.createElement('span');deathIcon.className='death-icon';deathIcon.textContent='\u2620';deathIcon.style.display='none';deathIcon.style.color='#ff4444';deathIcon.style.fontSize='12px';deathIcon.style.marginLeft='2px';

function updatePlayerDeathStatus(){
    document.querySelectorAll('#player-list .player-row').forEach(row=>{
        const user=row.dataset.username;if(!user)return;
        const deathTime=playerDeathTimes[user];
        const isDead=deathTime!==undefined&&playTime>=deathTime;
        const icon=row.querySelector('.death-icon');
        if(icon)icon.style.display=isDead?'inline':'none';
        row.style.opacity=isDead?0.4:1;
    });
}
function buildLoadoutBar(){
    const bar=document.getElementById('loadout-bar');bar.innerHTML='';
    for(const p of(posData.players||[])){
        const opInfo=findOpInfo(getPlayerOpName(p));
        const card=document.createElement('div');card.className='loadout-card';card.style.borderLeft=`2px solid ${playerColors[p.username]||'#555'}`;
        const icon=document.createElement('img');icon.className='op-icon';icon.src=`${ASSET_PATH}/operators/${getPlayerOpName(p)}.png`;icon.onerror=()=>{icon.style.background='#333';};
        const nameDiv=document.createElement('div');nameDiv.className='op-name';nameDiv.textContent=p.username;
        const gadgets=document.createElement('div');gadgets.className='loadout-gadgets';
        if(opInfo){const ai=document.createElement('img');ai.src=`${ASSET_PATH}/abilities/${opInfo.abilityFile}`;ai.title=opInfo.ability;gadgets.appendChild(ai);for(const eq of(opInfo.equipment||[])){const ei=document.createElement('img');ei.src=`${ASSET_PATH}/equipments/${eq}.png`;ei.title=eq;gadgets.appendChild(ei);}}
        card.append(icon,nameDiv,gadgets);bar.appendChild(card);
    }
}
function buildEventList(){
    const list=document.getElementById('event-list');list.innerHTML='';

    // Collect all events: activities + kills
    const allEvents = [];
    for(const act of activities){
        if(Math.abs(act.x)<1&&Math.abs(act.y)<1)continue;
        const elapsed = act.elapsed || (roundDuration - act.timeInSeconds);
        allEvents.push({kind:'activity', elapsed, data:act});
    }
    for(const evt of (posData.matchFeedback||[])){
        if(evt.type && (evt.type.name === 'Kill' || evt.type.name === 'Death')){
            const target = evt.target || evt.username;
            const elapsed = playerDeathTimes[target] !== undefined ? playerDeathTimes[target] : (roundDuration - (evt.timeInSeconds||0));
            allEvents.push({kind:'kill', elapsed, data:evt});
        }
    }
    // Reinforcements: find elapsed from position data (player's position at reinf time)
    for(const reinf of (posData.reinforcements||[])){
        if(!reinf.username) continue;
        // Find elapsed time from player's positions near this reinforcement
        const path = playerPaths[reinf.username];
        let elapsed = roundDuration - reinf.timeInSeconds; // fallback
        if(path){
            // Find the position closest to (reinf.x, reinf.y)
            let bestDist = Infinity;
            for(const p of path){
                const dx = p.x - reinf.x, dy = p.y - reinf.y;
                const d = Math.sqrt(dx*dx+dy*dy);
                if(d < bestDist){ bestDist = d; elapsed = p.t; }
            }
        }
        allEvents.push({kind:'reinforce', elapsed, data:reinf});
    }
    allEvents.sort((a,b) => a.elapsed - b.elapsed);

    for(const e of allEvents){
        const div=document.createElement('div');div.className='event-item';div.dataset.elapsed=e.elapsed;
        const time=document.createElement('span');time.className='time';
        if(e.kind==='activity'){
            const act=e.data;
            const fl=getFloorForZ(act.z);
            time.textContent=act.time;
            const text=document.createElement('span');text.textContent=`${FLOOR_LABELS[fl]||fl} ${act.type} +${act.scoreDelta}`;
            div.append(time,text);
        } else if(e.kind==='kill'){
            const evt=e.data;
            time.textContent=evt.time;
            const text=document.createElement('span');
            if(evt.type.name==='Kill'){
                const hs = evt.headshot ? ' \u{1F3AF}' : '';
                text.innerHTML=`<span style="color:${playerColors[evt.username]||'#eee'}">${evt.username}</span> \u2192 <span style="color:${playerColors[evt.target]||'#eee'}">${evt.target}</span>${hs}`;
            } else {
                text.textContent=`${evt.username} died`;
            }
            text.style.fontSize='9px';
            div.style.opacity='1';div.style.borderLeft='2px solid #ff4444';
            div.append(time,text);
        } else if(e.kind==='reinforce'){
            const reinf=e.data;
            time.textContent=reinf.time;
            const text=document.createElement('span');
            text.innerHTML=`<span style="color:${playerColors[reinf.username]||'#eee'}">${reinf.username}</span> reinforced`;
            text.style.fontSize='9px';
            div.style.opacity='1';div.style.borderLeft='2px solid #00bfff';
            div.append(time,text);
        }
        div.addEventListener('click',()=>{playTime=e.elapsed;playFrame=Math.round(playTime*10);document.getElementById('timeline').value=playFrame;updateTimeDisplay();drawFrame();});
        list.appendChild(div);
    }
}

// Keyboard
window.addEventListener('keydown',e=>{
    if(e.code==='Space'){e.preventDefault();document.getElementById('play-btn').click();}
    if(e.code==='ArrowRight'){playTime=Math.min(roundDuration,playTime+1);playFrame=Math.round(playTime*10);document.getElementById('timeline').value=playFrame;updateTimeDisplay();drawFrame();}
    if(e.code==='ArrowLeft'){playTime=Math.max(0,playTime-1);playFrame=Math.round(playTime*10);document.getElementById('timeline').value=playFrame;updateTimeDisplay();drawFrame();}
});
</script>
